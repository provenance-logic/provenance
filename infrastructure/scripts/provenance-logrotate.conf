# Provenance host-level log rotation
# Install to /etc/logrotate.d/provenance:
#   sudo cp infrastructure/scripts/provenance-logrotate.conf /etc/logrotate.d/provenance

/opt/provenance/backups/backup.log
/opt/provenance/backups/cloudwatch-health.log
{
    weekly
    rotate 4
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}
