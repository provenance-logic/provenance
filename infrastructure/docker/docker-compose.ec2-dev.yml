# Provenance — EC2 Development Stack
#
# Lightweight compose for EC2 dev instances. Includes the core services
# plus Neo4j and Redpanda for lineage and event streaming:
#
#   postgres, keycloak, opa, neo4j, redpanda, redpanda-init, api, web
#
# Excluded (not needed for Phase 1 dev): opensearch, minio,
# temporal, kong, and all init/setup containers.
#
# Disabled features when running this stack:
#   - Product search/indexing (OPENSEARCH_ENABLED=false)
#   - Access workflows (TEMPORAL_ENABLED=false)
#
# Usage:
#   ./start-ec2.sh up -d
#
# For the full stack:
#   docker compose -f infrastructure/docker/docker-compose.yml up -d

name: provenance-ec2

networks:
  provenance:
    driver: bridge

volumes:
  postgres_data:
  keycloak_data:
  opa_policies:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  redpanda_data:

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — control plane relational state
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: provenance-ec2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: provenance
      POSTGRES_USER: provenance
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-provenance_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - provenance
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provenance -d provenance"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Flyway — schema migrations
  # Runs all SQL migrations (V1–V9) before the API starts.
  # Uses the official Flyway Docker image — no Java needed in the API container.
  # ---------------------------------------------------------------------------
  flyway-migrate:
    image: flyway/flyway:10-alpine
    container_name: provenance-ec2-flyway-migrate
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        flyway -configFiles=/flyway/conf/flyway.conf -locations=filesystem:/flyway/sql baseline && \
        flyway -configFiles=/flyway/conf/flyway.conf -locations=filesystem:/flyway/sql migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/provenance
      FLYWAY_USER: provenance
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-provenance_dev_password}
    volumes:
      - ../../apps/api/flyway.conf:/flyway/conf/flyway.conf:ro
      - ../../apps/api/migrations:/flyway/sql:ro
    networks:
      - provenance
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Keycloak DB init — disable SSL requirement directly in PostgreSQL
  # Fixes the HTTPS chicken-and-egg: Keycloak requires HTTPS to access admin,
  # but we need admin to disable HTTPS. This runs SQL before Keycloak starts.
  # Safe to run repeatedly — UPDATE is idempotent.
  # ---------------------------------------------------------------------------
  keycloak-db-init:
    image: postgres:16-alpine
    container_name: provenance-ec2-keycloak-db-init
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-provenance_dev_password}
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for keycloak REALM table to exist..."
        for i in $(seq 1 30); do
          if psql -h postgres -U provenance -d keycloak -tAc "SELECT 1 FROM information_schema.tables WHERE table_name='realm'" 2>/dev/null | grep -q 1; then
            echo "REALM table found. Setting ssl_required=NONE..."
            psql -h postgres -U provenance -d keycloak -c "UPDATE realm SET ssl_required='NONE' WHERE id IN ('master', 'provenance');"
            echo "Done. SSL requirement disabled for master and provenance realms."
            exit 0
          fi
          echo "  Attempt $i/30 — REALM table not yet created, retrying in 5s..."
          sleep 5
        done
        echo "WARN: REALM table never appeared (first boot?). Keycloak will create it on startup."
        exit 0
    networks:
      - provenance
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Keycloak — OIDC identity provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: provenance-ec2-keycloak
    restart: unless-stopped
    command: start-dev --import-realm --http-enabled=true --hostname-strict=false --hostname-strict-https=false
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: provenance
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-provenance_dev_password}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-8080}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-provenance_dev_admin}
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./config/keycloak/realms:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    networks:
      - provenance
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Keycloak EC2 init — one-time realm configuration
  # Sets sslRequired=NONE and frontendUrl so HTTP access works on EC2.
  # Runs once after Keycloak is healthy, then exits.
  # ---------------------------------------------------------------------------
  keycloak-init:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: provenance-ec2-keycloak-init
    restart: "no"
    entrypoint: /bin/bash
    command: /scripts/configure-keycloak-ec2.sh
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-provenance_dev_admin}
      KC_FRONTEND_URL: ${KC_FRONTEND_URL:-http://54.83.160.49:8080}
    volumes:
      - ./scripts:/scripts:ro
    networks:
      - provenance
    depends_on:
      keycloak:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Open Policy Agent — hot-reloadable policy engine
  # ---------------------------------------------------------------------------
  opa:
    image: openpolicyagent/opa:0.63.0
    container_name: provenance-ec2-opa
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - --log-format=json
      - /policies
    volumes:
      - opa_policies:/policies
      - ./config/opa/policies:/policies/bootstrap:ro
    ports:
      - "8181:8181"
    networks:
      - provenance
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Neo4j Community — lineage graph (memory-constrained for EC2 dev)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.18-community
    container_name: provenance-ec2-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-provenance_dev_password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    networks:
      - provenance
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Redpanda — Kafka-compatible message broker (memory-constrained for EC2 dev)
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: provenance-ec2-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    ports:
      - "19092:19092"   # External Kafka
      - "18082:18082"   # External Pandaproxy (REST)
      - "18081:18081"   # Schema Registry
      - "9644:9644"     # Admin API
    networks:
      - provenance
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redpanda init — create topics on first boot
  # ---------------------------------------------------------------------------
  redpanda-init:
    image: redpandadata/redpanda:v24.1.1
    container_name: provenance-ec2-redpanda-init
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Creating Redpanda topics..."
        rpk topic create product.lifecycle --brokers redpanda:9092 -r 1 -p 1 2>/dev/null || true
        rpk topic create connector.health  --brokers redpanda:9092 -r 1 -p 1 2>/dev/null || true
        rpk topic create lineage.events    --brokers redpanda:9092 -r 1 -p 1 2>/dev/null || true
        rpk topic create lineage.events.dlq --brokers redpanda:9092 -r 1 -p 1 2>/dev/null || true
        echo "Topics created:"
        rpk topic list --brokers redpanda:9092
    networks:
      - provenance
    depends_on:
      redpanda:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # NestJS API — control plane monolith
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: provenance-ec2-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      # PostgreSQL
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: provenance
      DATABASE_USER: provenance
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-provenance_dev_password}
      # OPA
      OPA_BASE_URL: http://opa:8181
      # Keycloak
      KEYCLOAK_REALM: provenance
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_ISSUER_URL:-http://localhost:8080}
      KEYCLOAK_CLIENT_ID: provenance-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-provenance_dev_password}
      NEO4J_ENABLED: "true"
      # Redpanda / Kafka
      KAFKA_BROKERS: redpanda:9092
      REDPANDA_ENABLED: "true"
      # MCP agent query API key
      MCP_API_KEY: ${MCP_API_KEY:-}
      # Disabled services — connections fail gracefully
      OPENSEARCH_ENABLED: "false"
      TEMPORAL_ENABLED: "false"
    volumes:
      - ../../apps/api:/app/apps/api:cached
      - ../../packages/types:/app/packages/types:cached
      - /app/apps/api/node_modules
    ports:
      - "3001:3001"
    networks:
      - provenance
    depends_on:
      postgres:
        condition: service_healthy
      flyway-migrate:
        condition: service_completed_successfully
      keycloak:
        condition: service_healthy
      opa:
        condition: service_started
      neo4j:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # React Frontend — Vite dev server
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: provenance-ec2-web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://54.83.160.49:3001/api/v1}
      VITE_AGENT_BASE_URL: ${VITE_AGENT_BASE_URL:-http://54.83.160.49:3001/agent/v1}
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8080}
      VITE_KEYCLOAK_REALM: provenance
      VITE_KEYCLOAK_CLIENT_ID: provenance-web
    volumes:
      - ../../apps/web:/app/apps/web:cached
      - ../../packages/types:/app/packages/types:cached
      - /app/apps/web/node_modules
    ports:
      - "3000:3000"
    networks:
      - provenance
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Agent Query Layer — MCP server for AI agents
  # ---------------------------------------------------------------------------
  agent-query:
    build:
      context: ../../
      dockerfile: apps/agent-query/Dockerfile
      target: development
    container_name: provenance-ec2-agent-query
    restart: unless-stopped
    environment:
      PORT: 3002
      CONTROL_PLANE_URL: http://api:3001
      MCP_API_KEY: ${MCP_API_KEY:-}
      NODE_ENV: development
    volumes:
      - ../../apps/agent-query:/app/apps/agent-query:cached
      - /app/apps/agent-query/node_modules
    ports:
      - "3002:3002"
    networks:
      - provenance
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
