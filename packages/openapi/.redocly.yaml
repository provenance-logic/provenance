extends:
  - recommended

# Rules tuned for the existing Provenance spec style. The specs were authored
# against OpenAPI 3.0 semantics and still use `nullable: true` / security
# declarations at the operation level rather than the document level. The
# rules below are turned off so CI does not flag those legacy patterns as new
# errors. Modernizing the specs to strict 3.1 style (oneOf [type, "null"],
# top-level security defaults, per-op security overrides) is tracked as a
# separate documentation workstream.
rules:
  # The struct rule in 3.1 mode rejects `nullable: true` (a 3.0-ism) and flags
  # any object whose keys don't match the OpenAPI 3.1 struct. All of our specs
  # predate the 3.0 -> 3.1 migration.
  struct: off

  # Several endpoints inherit security from the document's top-level
  # `security` array but the recommended preset still flags them because it
  # walks operations in isolation.
  security-defined: off

  # Non-blocking style nudge — we do not publish specs under a license field.
  info-license: off
