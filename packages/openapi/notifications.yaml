openapi: 3.1.0
info:
  title: Provenance Notifications API
  version: 0.1.0
  description: |
    In-platform notification inbox for the Provenance Platform (Domain 11).

    The notification record is the source of truth and is also what the
    in-platform notification center reads from. Email and webhook delivery
    channels (F11.2) are added in subsequent PRs and are not visible on
    this surface — they will be configured via a separate preferences
    surface and delivered out-of-band by a worker.

    Architecture: ADR-009.

servers:
  - url: /api/v1

tags:
  - name: Notifications
    description: In-platform notification inbox
  - name: NotificationPreferences
    description: Per-principal notification preferences (F11.3)

paths:
  /organizations/{orgId}/notifications:
    parameters:
      - $ref: '#/components/parameters/orgId'

    get:
      operationId: listNotifications
      summary: List notifications addressed to the calling principal
      tags: [Notifications]
      description: |
        Returns a paginated list of notifications addressed to the calling
        principal in their current organization. The recipient is derived
        from the JWT — callers cannot list other principals' notifications
        through this endpoint.

        Default ordering is most recent first. Dismissed notifications are
        excluded by default.
      parameters:
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/NotificationCategory'
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
        - name: excludeDismissed
          in: query
          schema:
            type: boolean
            default: true
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationList'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /organizations/{orgId}/notifications/{notificationId}/read:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/notificationId'

    post:
      operationId: markNotificationRead
      summary: Mark a notification as read
      tags: [Notifications]
      description: |
        Sets `readAt` to the current server time. Only the addressed
        recipient may mark their own notification as read; attempts by
        any other principal return 404 (not 403 — the existence of
        another principal's notification is not disclosed).

        Marking an already-read notification as read is idempotent and
        does not change the existing `readAt` timestamp.
      responses:
        '200':
          description: Notification (now read)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /organizations/{orgId}/notifications/{notificationId}/dismiss:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - $ref: '#/components/parameters/notificationId'

    post:
      operationId: dismissNotification
      summary: Dismiss a notification from the inbox
      tags: [Notifications]
      description: |
        Sets `dismissedAt` to the current server time. Dismissed
        notifications are excluded from the default list query but
        are retained for the configured history window (NF11.5: 90
        days) and remain queryable via `excludeDismissed=false`.

        Dismissing an already-dismissed notification is idempotent.
      responses:
        '200':
          description: Notification (now dismissed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /organizations/{orgId}/notifications/preferences:
    parameters:
      - $ref: '#/components/parameters/orgId'

    get:
      operationId: listNotificationPreferences
      summary: List the calling principal's notification preferences (F11.3)
      tags: [NotificationPreferences]
      description: |
        Returns every preference row the calling principal has saved. Categories
        without a saved row use the platform-default channel set
        (`CATEGORY_DEFAULT_CHANNELS` in `@provenance/types`); the absence of a
        row is the answer for those categories.
      responses:
        '200':
          description: Array of saved preferences
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationPreference'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /organizations/{orgId}/notifications/preferences/{category}:
    parameters:
      - $ref: '#/components/parameters/orgId'
      - name: category
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/NotificationCategory'

    put:
      operationId: upsertNotificationPreference
      summary: Set the calling principal's preference for a category
      tags: [NotificationPreferences]
      description: |
        Creates or updates the preference row for the calling principal and
        the given category. Either `enabled` or `channels` (or both) may be
        supplied; missing fields keep their existing value.

        Governance-mandatory categories (F11.3) ignore `enabled = false` at
        resolution time and are always delivered to at least the in-platform
        channel. The override request is still saved but does not actually
        suppress delivery for those categories.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationPreferenceRequest'
      responses:
        '200':
          description: Saved preference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreference'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

    delete:
      operationId: resetNotificationPreference
      summary: Reset a category's preference to the platform default
      tags: [NotificationPreferences]
      description: |
        Removes the saved preference row for the calling principal and the
        given category. The channel resolver treats a missing row as
        "use the platform default," so deletion is the correct shape for
        "reset."

        Idempotent — deleting a non-existent preference returns 204.
      responses:
        '204':
          description: Preference reset
        '401': { $ref: '#/components/responses/Unauthorized' }

  /organizations/{orgId}/notifications/settings:
    parameters:
      - $ref: '#/components/parameters/orgId'

    get:
      operationId: getPrincipalNotificationSettings
      summary: Get the calling principal's notification settings
      tags: [NotificationPreferences]
      description: |
        Returns one row per principal containing cross-category settings —
        currently only the outbound webhook URL. A principal who has never
        configured settings receives a synthetic row with `webhookUrl: null`,
        not a 404.
      responses:
        '200':
          description: Settings (real or synthetic)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalNotificationSettings'
        '401': { $ref: '#/components/responses/Unauthorized' }

    put:
      operationId: updatePrincipalNotificationSettings
      summary: Update the calling principal's notification settings
      tags: [NotificationPreferences]
      description: |
        Sets the outbound webhook URL the delivery worker uses when a
        notification's resolved channel set includes `webhook`. Pass `null`
        or an empty string to clear the URL. The URL must be `https`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePrincipalNotificationSettingsRequest'
      responses:
        '200':
          description: Saved settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrincipalNotificationSettings'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

components:
  parameters:
    orgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    notificationId:
      name: notificationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    BadRequest:
      description: Bad request — validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [statusCode, error, message]
      properties:
        statusCode:
          type: integer
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object

    PaginationMeta:
      type: object
      required: [total, limit, offset]
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    NotificationCategory:
      type: string
      description: |
        Closed enum of notification categories. One per F-ID in PRD
        Domain 11, plus `connection_reference_request` for the Domain 12
        F12.10 fan-out. Not extensible at the organization layer.
      enum:
        - access_request_submitted
        - access_request_approved
        - access_request_denied
        - access_request_sla_warning
        - access_request_sla_breach
        - access_grant_expiring
        - product_deprecated
        - product_decommissioned
        - product_published
        - schema_drift_detected
        - slo_violation
        - trust_score_significant_change
        - connector_health_degraded
        - policy_change_impact
        - compliance_drift_detected
        - grace_period_expiring
        - classification_changed
        - agent_classification_changed
        - agent_suspended
        - human_review_required
        - frozen_operation_disposition
        - connection_package_refreshed
        - connection_reference_request

    Notification:
      type: object
      required:
        - id
        - orgId
        - recipientPrincipalId
        - category
        - payload
        - deepLink
        - dedupKey
        - dedupCount
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        orgId:
          type: string
          format: uuid
        recipientPrincipalId:
          type: string
          format: uuid
        category:
          $ref: '#/components/schemas/NotificationCategory'
        payload:
          type: object
          description: Category-specific structured payload (shape is the trigger module's contract).
          additionalProperties: true
        deepLink:
          type: string
          description: Route in the platform UI the notification deep-links to.
        dedupKey:
          type: string
          description: Stable per-trigger key used for deduplication within the configured window.
        dedupCount:
          type: integer
          minimum: 1
          description: |
            Number of times this notification has been suppressed by the
            dedup window. Starts at 1 (the first delivery counts).
        readAt:
          type: [string, 'null']
          format: date-time
        dismissedAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: string
          format: date-time

    NotificationList:
      type: object
      required: [items, meta]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    NotificationDeliveryChannel:
      type: string
      enum: [in_platform, email, webhook]

    NotificationPreference:
      type: object
      required:
        - orgId
        - principalId
        - category
        - enabled
        - channels
        - updatedAt
      properties:
        orgId:
          type: string
          format: uuid
        principalId:
          type: string
          format: uuid
        category:
          $ref: '#/components/schemas/NotificationCategory'
        enabled:
          type: boolean
          description: |
            When false, the principal opts out of this category. Governance-
            mandatory categories ignore this flag at resolution time.
        channels:
          type: array
          description: |
            Channel override. When non-empty, replaces the category's default
            channel set for this principal. The in-platform channel is always
            re-added at resolution time.
          items:
            $ref: '#/components/schemas/NotificationDeliveryChannel'
        updatedAt:
          type: string
          format: date-time

    UpdateNotificationPreferenceRequest:
      type: object
      description: |
        At least one of `enabled` or `channels` must be supplied; missing
        fields are left unchanged.
      properties:
        enabled:
          type: boolean
        channels:
          type: array
          description: |
            Pass an empty array to clear an existing override and fall back to
            the category default.
          items:
            $ref: '#/components/schemas/NotificationDeliveryChannel'

    PrincipalNotificationSettings:
      type: object
      required: [orgId, principalId, updatedAt]
      properties:
        orgId:
          type: string
          format: uuid
        principalId:
          type: string
          format: uuid
        webhookUrl:
          type: [string, 'null']
          maxLength: 2000
          description: |
            Outbound webhook URL the delivery worker POSTs to when a
            notification's resolved channel set includes `webhook`. Null
            when the principal has not configured a webhook.
        updatedAt:
          type: string
          format: date-time

    UpdatePrincipalNotificationSettingsRequest:
      type: object
      required: [webhookUrl]
      properties:
        webhookUrl:
          type: [string, 'null']
          maxLength: 2000
          description: |
            Pass null or an empty string to clear an existing URL. Must be
            `https` if non-null.
