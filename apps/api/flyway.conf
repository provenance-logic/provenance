# Flyway configuration for MeshOS API
# Override these values via environment variables in CI and production.
# NEVER commit real credentials.

flyway.url=jdbc:postgresql://${FLYWAY_HOST:localhost}:${FLYWAY_PORT:5432}/${FLYWAY_DATABASE:meshos}
flyway.user=${FLYWAY_USER:meshos}
flyway.password=${FLYWAY_PASSWORD:meshos_dev_password}
flyway.locations=filesystem:./migrations
flyway.schemas=organizations,identity,products,audit
flyway.defaultSchema=organizations
flyway.validateOnMigrate=true
flyway.outOfOrder=false
flyway.baselineOnMigrate=true
flyway.baselineVersion=0
